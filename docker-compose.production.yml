      JWT_ISSUER: ${JWT_ISSUER:-hamdong.identity-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-hamdong.services}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-IRR}
      MAX_SETTLEMENT_AMOUNT_MINOR: ${MAX_SETTLEMENT_AMOUNT_MINOR:-100000000000}
      EVENT_OUTBOX_BATCH_SIZE: ${EVENT_OUTBOX_BATCH_SIZE:-50}
