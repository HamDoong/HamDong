      settlement-service:
        condition: service_started
      media-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: unless-stopped
  wallet-service:
    build: ./Backend/services/wallet-service
    env_file: ./.env
    command:
    - python
    - manage.py
    - runserver
    - 0.0.0.0:8000
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${WALLET_DB_NAME:-wallet_db}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE:-hamdong.identity}
      SETTLEMENT_RABBITMQ_EXCHANGE: ${SETTLEMENT_RABBITMQ_EXCHANGE:-hamdong.settlement}
      WALLET_RABBITMQ_EXCHANGE: ${WALLET_RABBITMQ_EXCHANGE:-hamdong.wallet}
      WALLET_IDENTITY_QUEUE: ${WALLET_IDENTITY_QUEUE:-wallet.identity.user_events}
      WALLET_SETTLEMENT_QUEUE: ${WALLET_SETTLEMENT_QUEUE:-wallet.settlement.events}
      IDENTITY_JWKS_URL: ${IDENTITY_JWKS_URL:-http://identity-service:8000/api/v1/auth/.well-known/jwks.json}
      IDENTITY_PUBLIC_KEY_PATH: ${IDENTITY_PUBLIC_KEY_PATH:-/app/keys/public.pem}
      JWT_ISSUER: ${JWT_ISSUER:-hamdong.identity-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-hamdong.services}
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:-http://identity-service:8000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-hamdong-internal-token}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-00000000-0000-0000-0000-000000000000}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-true}
      ZARINPAL_CALLBACK_BASE_URL: ${ZARINPAL_CALLBACK_BASE_URL:-http://localhost:8080}
      ZARINPAL_HTTP_TIMEOUT_SECONDS: ${ZARINPAL_HTTP_TIMEOUT_SECONDS:-10}
    ports:
    - 127.0.0.1:8008:8000
    volumes:
    - ./Backend/services/wallet-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      identity-service:
        condition: service_started
      settlement-service:
        condition: service_started
    restart: unless-stopped
  dashboard-consumer:
    build: ./Backend/services/dashboard-service
    env_file: ./.env
    command:
    - python
    - manage.py
    - consume_events
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DASHBOARD_DB_NAME:-dashboard_db}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      IDENTITY_JWKS_URL: ${IDENTITY_JWKS_URL:-http://identity-service:8000/api/v1/auth/.well-known/jwks.json}
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      group-service:
        condition: service_started
      expense-service:
        condition: service_started
      settlement-service:
        condition: service_started
      media-service:
        condition: service_started
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    env_file: ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER} -d postgres
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
    - 127.0.0.1:5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./Backend/infra/postgres/init:/docker-entrypoint-initdb.d
  redis:
    image: redis:7-alpine
    ports:
    - 127.0.0.1:6379:6379
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
    - 127.0.0.1:5672:5672
    - 127.0.0.1:15672:15672
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
    - api-gateway
  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: ./.env
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
    depends_on:
    - frontend
volumes:
  postgres_data: {}
  media_uploads: {}
  frontend_node_modules: {}
  caddy_data: {}
  caddy_config: {}
