services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
    - 127.0.0.1:8080:80
    volumes:
    - ./Backend/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf.template:ro
    command: "/bin/sh -c '\n  SRC=/etc/nginx/conf.d/default.conf.template;\n  DST=/etc/nginx/conf.d/default.conf;\n\
      \  if [ \"$$(head -c 3 \"$$SRC\" | od -An -tx1 | tr -d \" \\n\")\" = \"efbbbf\"\
      \ ]; then\n    tail -c +4 \"$$SRC\" > \"$$DST\";\n  else\n    cp \"$$SRC\" \"\
      $$DST\";\n  fi;\n  nginx -t && nginx -g \"daemon off;\";\n'\n"
    depends_on:
    - identity-service
    - group-service
    - expense-service
    - settlement-service
    - media-service
    - notification-service
    - dashboard-service
    - wallet-service
    restart: unless-stopped
  identity-service:
    build: ./Backend/services/identity-service
    env_file: ./.env
    command:
    - python
    - manage.py
    - runserver
    - 0.0.0.0:8000
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      IDENTITY_DB_NAME: ${IDENTITY_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
    - 127.0.0.1:8001:8000
    volumes:
    - ./Backend/services/identity-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped
  group-service:
    build: ./Backend/services/group-service
    env_file: ./.env
    command:
    - python
    - manage.py
    - runserver
    - 0.0.0.0:8000
    environment:
