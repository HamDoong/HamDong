upstream identity_service {
    server identity-service:8000;
}

upstream group_service {
    server group-service:8000;
}

upstream expense_service {
    server expense-service:8000;
}

upstream media_service {
    server media-service:8000;
}

upstream settlement_service {
    server settlement-service:8000;
}

upstream notification_service {
    server notification-service:8000;
}

server {
    listen 80;

    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/v1/auth/health/ {
        proxy_pass http://identity_service/health/;
    }

    location = /api/v1/groups/health/ {
        proxy_pass http://group_service/health/;
    }

    location = /api/v1/expenses/health/ {
        proxy_pass http://expense_service/health/;
    }

    location = /api/v1/settlements/health/ {
        proxy_pass http://settlement_service/health/;
    }

    location = /api/v1/media/health/ {
        proxy_pass http://media_service/health/;
    }

    location = /api/v1/notifications/health/ {
        proxy_pass http://notification_service/health/;
    }

    location ~ ^/api/v1/groups/[^/]+/expenses(/|$) {
        proxy_pass http://expense_service;
    }

    location ~ ^/api/v1/groups/[^/]+/media(/|$) {
        proxy_pass http://media_service;
    }

    location ~ ^/api/v1/groups/[^/]+/(balances|debts|settlements|settlement-plan)(/|$) {
        proxy_pass http://settlement_service;
    }

    location /api/v1/auth/ {
        proxy_pass http://identity_service;
    }

    location /api/v1/users/ {
        proxy_pass http://identity_service;
    }

    location /api/v1/expenses/ {
        proxy_pass http://expense_service;
    }

    location /api/v1/media/ {
        proxy_pass http://media_service;
    }

    location /api/v1/settlements/ {
        proxy_pass http://settlement_service;
    }

    location /api/v1/settlement-plans/ {
        proxy_pass http://settlement_service;
    }

    location /api/v1/settlement-plan-items/ {
        proxy_pass http://settlement_service;
    }

    location /api/v1/notifications/ {
        proxy_pass http://notification_service;
    }

    location /api/v1/groups/ {
        proxy_pass http://group_service;
    }
}
