server {
    listen 80;

    resolver 127.0.0.11 ipv6=off valid=10s;

    set $identity_upstream identity-service:8000;
    set $group_upstream group-service:8000;
    set $expense_upstream expense-service:8000;
    set $settlement_upstream settlement-service:8000;
    set $media_upstream media-service:8000;
    set $notification_upstream notification-service:8000;

    location = /api/v1/auth/health/ {
        proxy_pass http://$identity_upstream/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/auth/ {
        proxy_pass http://$identity_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/users/ {
        proxy_pass http://$identity_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/groups/ {
        proxy_pass http://$group_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/expenses/ {
        proxy_pass http://$expense_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/settlements/ {
        proxy_pass http://$settlement_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/media/ {
        proxy_pass http://$media_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/notifications/ {
        proxy_pass http://$notification_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
