services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - identity-service
      - group-service
      - expense-service
      - settlement-service
      - media-service
      - notification-service

  identity-service:
    build: ./services/identity-service
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      IDENTITY_DB_NAME: ${IDENTITY_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8001:8000"
    volumes:
      - ./services/identity-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  group-service:
    build: ./services/group-service
    env_file: .env
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${GROUP_DB_NAME}
      GROUP_DB_NAME: ${GROUP_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8002:8000"
    volumes:
      - ./services/group-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  group-consumer:
    build: ./services/group-service
    env_file: .env
    command: ["python", "manage.py", "consume_identity_events"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${GROUP_DB_NAME}
      GROUP_DB_NAME: ${GROUP_DB_NAME}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE}
      GROUP_IDENTITY_QUEUE: ${GROUP_IDENTITY_QUEUE}
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started

  expense-service:
    build: ./services/expense-service
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${EXPENSE_DB_NAME}
      EXPENSE_DB_NAME: ${EXPENSE_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      EXPENSE_RABBITMQ_EXCHANGE: ${EXPENSE_RABBITMQ_EXCHANGE}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE}
      GROUP_RABBITMQ_EXCHANGE: ${GROUP_RABBITMQ_EXCHANGE}
      IDENTITY_JWKS_URL: ${IDENTITY_JWKS_URL}
      IDENTITY_PUBLIC_KEY_PATH: ${IDENTITY_PUBLIC_KEY_PATH}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    ports:
      - "8003:8000"
    volumes:
      - ./services/expense-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  settlement-service:
    build: ./services/settlement-service
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${SETTLEMENT_DB_NAME}
      SETTLEMENT_DB_NAME: ${SETTLEMENT_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8004:8000"
    volumes:
      - ./services/settlement-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  media-service:
    build: ./services/media-service
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${MEDIA_DB_NAME}
      MEDIA_DB_NAME: ${MEDIA_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8005:8000"
    volumes:
      - ./services/media-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification-service:
    build: ./services/notification-service
    env_file: .env
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME}
      NOTIFICATION_RABBITMQ_EXCHANGE: ${NOTIFICATION_RABBITMQ_EXCHANGE}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE}
      IDENTITY_OTP_QUEUE: ${IDENTITY_OTP_QUEUE}
      IDENTITY_OTP_DLX: ${IDENTITY_OTP_DLX}
      IDENTITY_OTP_DLQ: ${IDENTITY_OTP_DLQ}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      SMS_PROVIDER: ${SMS_PROVIDER}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_SENDER: ${SMS_SENDER}
      SMS_TEMPLATE_OTP_LOGIN: ${SMS_TEMPLATE_OTP_LOGIN}
      SMS_CIRCUIT_FAIL_MAX: ${SMS_CIRCUIT_FAIL_MAX}
      SMS_CIRCUIT_RESET_TIMEOUT_SECONDS: ${SMS_CIRCUIT_RESET_TIMEOUT_SECONDS}
      SMS_OTP_MAX_RETRIES: ${SMS_OTP_MAX_RETRIES}
      SMS_OTP_RETRY_DELAYS_SECONDS: ${SMS_OTP_RETRY_DELAYS_SECONDS}
    ports:
      - "8006:8000"
    volumes:
      - ./services/notification-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification-consumer:
    build: ./services/notification-service
    env_file: .env
    command: ["python", "manage.py", "consume_identity_events"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME}
      NOTIFICATION_RABBITMQ_EXCHANGE: ${NOTIFICATION_RABBITMQ_EXCHANGE}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE}
      IDENTITY_OTP_QUEUE: ${IDENTITY_OTP_QUEUE}
      IDENTITY_OTP_DLX: ${IDENTITY_OTP_DLX}
      IDENTITY_OTP_DLQ: ${IDENTITY_OTP_DLQ}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      SMS_PROVIDER: ${SMS_PROVIDER}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_SENDER: ${SMS_SENDER}
      SMS_TEMPLATE_OTP_LOGIN: ${SMS_TEMPLATE_OTP_LOGIN}
      SMS_CIRCUIT_FAIL_MAX: ${SMS_CIRCUIT_FAIL_MAX}
      SMS_CIRCUIT_RESET_TIMEOUT_SECONDS: ${SMS_CIRCUIT_RESET_TIMEOUT_SECONDS}
      SMS_OTP_MAX_RETRIES: ${SMS_OTP_MAX_RETRIES}
      SMS_OTP_RETRY_DELAYS_SECONDS: ${SMS_OTP_RETRY_DELAYS_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started

  expense-service:
    build: ./services/expense-service
    env_file: .env
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${EXPENSE_DB_NAME}
      EXPENSE_DB_NAME: ${EXPENSE_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8007:8000"
    volumes:
      - ./services/expense-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  expense-consumer:
    build: ./services/expense-service
    env_file: .env
    command: ["python", "manage.py", "consume_events"]
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${EXPENSE_DB_NAME}
      EXPENSE_DB_NAME: ${EXPENSE_DB_NAME}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      EXPENSE_IDENTITY_QUEUE: ${EXPENSE_IDENTITY_QUEUE}
      EXPENSE_GROUP_QUEUE: ${EXPENSE_GROUP_QUEUE}
      EXPENSE_RABBITMQ_EXCHANGE: ${EXPENSE_RABBITMQ_EXCHANGE}
      IDENTITY_RABBITMQ_EXCHANGE: ${IDENTITY_RABBITMQ_EXCHANGE}
      GROUP_RABBITMQ_EXCHANGE: ${GROUP_RABBITMQ_EXCHANGE}
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      group-service:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
