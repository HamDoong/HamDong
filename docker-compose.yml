x-django-healthcheck: &django-healthcheck
  test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()\""]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 40s

x-django-auto-migrate-env: &django-auto-migrate-env
  AUTO_CREATE_DB: "1"
  AUTO_MIGRATE: "1"
  STRICT_SCHEMA_CHECK: "1"

services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
    - 8080:80
    volumes:
    - ./backend/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      identity-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
      expense-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  identity-service:
    build: ./backend/services/identity-service
    env_file: ./.env.example
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      <<: *django-auto-migrate-env
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      IDENTITY_DB_NAME: ${IDENTITY_DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
    - 8001:8000
    volumes:
    - ./backend/services/identity-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    healthcheck: *django-healthcheck

  group-service:
    build: ./backend/services/group-service
    env_file: ./.env.example
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
