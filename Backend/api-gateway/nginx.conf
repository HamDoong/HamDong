limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_burst_limit:10m rate=60r/m;

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

upstream identity_service {
    server identity-service:8000;
}

upstream group_service {
    server group-service:8000;
}

upstream expense_service {
    server expense-service:8000;
}

upstream media_service {
    server media-service:8000;
}

upstream settlement_service {
    server settlement-service:8000;
}

upstream notification_service {
    server notification-service:8000;
}

upstream dashboard_service {
    server dashboard-service:8000;
}

upstream wallet_service {
    server wallet-service:8000;
}

server {
    listen 80;

    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

    location = /api/v1/auth/health/ {
        proxy_pass http://identity_service/health/;
    }

    location = /api/v1/groups/health/ {
        proxy_pass http://group_service/health/;
    }

    location = /api/v1/expenses/health/ {
        proxy_pass http://expense_service/health/;
    }

    location = /api/v1/settlements/health/ {
        proxy_pass http://settlement_service/health/;
    }

    location = /api/v1/media/health/ {
        proxy_pass http://media_service/health/;
    }

    location = /api/v1/notifications/health/ {
        proxy_pass http://notification_service/health/;
    }

    location = /api/v1/dashboard/health/ {
        proxy_pass http://dashboard_service/health/;
    }

    location = /api/v1/wallets/health/ {
        proxy_pass http://wallet_service/health/;
    }

    location ~ ^/api/v1/groups/[^/]+/expenses(/|$) {
        proxy_pass http://expense_service;
    }

    location ~ ^/api/v1/groups/[^/]+/media(/|$) {
        proxy_pass http://media_service;
    }

    location ~ ^/api/v1/groups/[^/]+/(balances|debts|settlements|settlement-plan)(/|$) {
        proxy_pass http://settlement_service;
    }

    # Admin APIs
    location = /api/v1/admin/system/health/ {
        proxy_pass http://identity_service;
    }

    location /api/v1/admin/users/ {
        proxy_pass http://identity_service;
    }

    location = /api/v1/admin/groups/ {
        proxy_pass http://group_service;
    }

    location = /api/v1/admin/settlements/ {
        proxy_pass http://settlement_service;
    }

    location = /api/v1/admin/outbox/ {
        proxy_pass http://settlement_service;
    }

    location = /api/v1/admin/failed-events/ {
        proxy_pass http://settlement_service;
    }

    location = /api/v1/admin/wallet-transactions/ {
        proxy_pass http://wallet_service;
    }

    location = /api/v1/admin/payments/ {
        proxy_pass http://wallet_service;
    }

    location = /api/v1/admin/notifications/ {
        proxy_pass http://notification_service;
    }
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://identity_service;
    }

    location = /api/v1/users/me/group-invitations/ {
        proxy_pass http://group_service;
    }

    location /api/v1/group-invitations/ {
        proxy_pass http://group_service;
    }

    location = /api/v1/users/me/receipts/ {
        proxy_pass http://media_service;
    }
    location /api/v1/users/ {
        proxy_pass http://identity_service;
    }

    location ~ ^/api/v1/expenses/[^/]+/receipts/?$ {
        proxy_pass http://media_service;
    }
    location /api/v1/expenses/ {
        proxy_pass http://expense_service;
    }

    location /api/v1/media/ {
        proxy_pass http://media_service;
    }

    location /api/v1/settlements/ {
        limit_req zone=api_burst_limit burst=120 nodelay;
        proxy_pass http://settlement_service;
    }

    location /api/v1/settlement-plans/ {
        proxy_pass http://settlement_service;
    }

    location /api/v1/settlement-plan-items/ {
        proxy_pass http://settlement_service;
    }

    location /api/v1/notifications/ {
        proxy_pass http://notification_service;
    }

    location /api/v1/dashboard/ {
        proxy_pass http://dashboard_service;
    }

    location /api/v1/wallets/ {
        limit_req zone=api_burst_limit burst=120 nodelay;
        proxy_pass http://wallet_service;
    }

    location /api/v1/payments/ {
        limit_req zone=api_burst_limit burst=120 nodelay;
        proxy_pass http://wallet_service;
    }

    location /api/v1/groups/ {
        proxy_pass http://group_service;
    }
}
