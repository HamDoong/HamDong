name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  full-stack-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare backend env
        run: cp backend/.env.example backend/.env

      - name: Validate docker compose
        run: docker compose --env-file backend/.env -f docker-compose.yml config

      - name: Build full stack
        run: docker compose --env-file backend/.env -f docker-compose.yml build
